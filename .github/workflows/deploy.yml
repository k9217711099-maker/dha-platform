name: Deploy

# Единственный прод-сервер — 83.166.247.226 (обслуживает nomero.online). Деплой = push в develop.
# Ветка main и второй бокс временно выведены из деплоя (решение владельца 2026-07-24) — вернёмся,
# когда сервис будет готов и наведём «правильные» имена веток.
on:
  push:
    branches: [develop]

# Только один деплой на ветку одновременно. Без этого несколько быстрых пушей (напр.
# из разных чатов) запускали параллельные деплои, лезли по SSH на один сервер и дрались
# → падения за 3–40 сек. Очередь (cancel-in-progress: false) выполняет их по одному,
# не прерывая уже идущий (pm2-рестарт не обрывается на полуслове).
concurrency:
  group: deploy-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Деплой по SSH (PRODUCTION — 83.166.247.226)
        uses: appleboy/ssh-action@v1.2.0
        with:
          # ЕДИНСТВЕННЫЙ прод-сервер, обслуживает nomero.online (проверено: DNS домена → этот IP,
          # hostname cv7639865). Прописан ЯВНО, а не через секрет PROD_HOST/STAGING_HOST: имена
          # тех секретов были инвертированы (STAGING_HOST = живой прод, PROD_HOST = простаивающий
          # бокс) — из-за этого правки уходили не на тот сервер. SSH-доступ — по-прежнему из секретов.
          host: 83.166.247.226
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          # Дефолт appleboy — 10 мин; запас на полную пересборку (реально ~2–3 мин).
          command_timeout: 30m
          script: |
            cd /var/www/dha
            # Публичный адрес API для сборки фронта (HTTPS-домен). Задаётся здесь, а не
            # только в deploy.sh, чтобы применилось СРАЗУ (workflow берётся из пушимого
            # коммита, без лага самообновления deploy.sh).
            export PUBLIC_API_URL=https://api.nomero.online/api
            # Публичный адрес гостевого портала для ссылок заселения. Домен nomero.online
            # обслуживается этим (единственным) боксом — ссылки должны вести на
            # https://nomero.online, а не на localhost. Задаём здесь (сразу, без лага
            # deploy.sh); deploy.sh читает через ${GUEST_PORTAL_URL:-...}.
            export GUEST_PORTAL_URL=https://nomero.online
            # ЧИСТИМ кэш turbo/Next ДО сборки (здесь, не в deploy.sh — без лага самообновления
            # скрипта). БЕЗ этого turbo отдавал «FULL TURBO cache hit» и восстанавливал ЗАЛИПШИЙ
            # старый бандл → деплой зелёный, а прод замёрз на старом коде (роуты 404). Инкрементальный
            # кэш («вариант 1») тут ненадёжен, поэтому пересобираем начисто. Дёшево: по логам
            # реальные тайминги admin ~38с, web ~22с, api секунды → весь деплой ~2–3 мин.
            # Чистим и apps/api/dist + tsconfig.tsbuildinfo: иначе tsc-incremental пропускает
            # изменённые файлы, dist остаётся старым при зелёном деплое → API замерзает на старом коде.
            rm -rf .turbo apps/web/.next apps/web/.turbo apps/admin/.next apps/admin/.turbo apps/api/dist apps/api/tsconfig.tsbuildinfo apps/api/.turbo node_modules/.cache || true
            bash infra/deploy/deploy.sh ${{ github.ref_name }}
            # Жёсткий перезапуск ВСЕХ трёх (вкл. dha-api): pm2 reload (graceful) в fork-режиме
            # мог держать в памяти старый код/пререндер → отдавались старые чанки и старые
            # роуты API (деплой зелёный, а код старый). restart = гарантированно новый процесс.
            pm2 restart dha-api dha-web dha-admin --update-env || pm2 restart all --update-env || true
            # Self-hosted OCR-сайдкар (Tesseract) ОТКЛЮЧЁН: перешли на облачный Yandex Vision
            # (PASSPORT_PROVIDER=yandex в ecosystem/.env). PASSPORT_OCR_ENABLE=0 — скрипт не
            # трогает провайдера, иначе он перебивал бы yandex на http при каждом деплое.
            export PASSPORT_OCR_ENABLE=0
            bash infra/deploy/passport-ocr.sh || true
