name: Deploy

# push в develop → staging-сервер (превью), push в main → production-сервер.
on:
  push:
    branches: [main, develop]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Выбрать сервер по ветке
        id: target
        run: |
          if [ "${{ github.ref_name }}" = "main" ]; then
            echo "host=${{ secrets.PROD_HOST }}" >> "$GITHUB_OUTPUT"
            echo "env_name=PRODUCTION" >> "$GITHUB_OUTPUT"
          else
            echo "host=${{ secrets.STAGING_HOST }}" >> "$GITHUB_OUTPUT"
            echo "env_name=STAGING" >> "$GITHUB_OUTPUT"
          fi

      - name: Деплой по SSH (${{ steps.target.outputs.env_name }})
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ steps.target.outputs.host }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /var/www/dha
            # Публичный адрес API для сборки фронта (HTTPS-домен). Задаётся здесь, а не
            # только в deploy.sh, чтобы применилось СРАЗУ (workflow берётся из пушимого
            # коммита, без лага самообновления deploy.sh).
            export PUBLIC_API_URL=https://api.nomero.online/api
            # Чистим кэши сборки ДО deploy.sh (workflow берётся из пушимого коммита —
            # без задержки самообновления скрипта). Гарантирует, что фронт
            # пересоберётся с актуальным исходником, а не из кэша turbo/Next.
            rm -rf .turbo apps/web/.next apps/web/.turbo apps/admin/.next apps/admin/.turbo node_modules/.cache || true
            bash infra/deploy/deploy.sh ${{ github.ref_name }}
            # Жёсткий перезапуск фронта: pm2 reload (graceful) в fork-режиме мог держать
            # старую пререндеренную страницу в памяти → отдавались старые чанки.
            pm2 restart dha-web dha-admin --update-env || pm2 restart all --update-env || true
